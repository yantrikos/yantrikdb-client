name: Publish to PyPI

# Triggers on tag push (e.g. v0.3.0) or manual dispatch.
# Uses PyPI Trusted Publishing (OIDC) — no long-lived tokens.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: "Target index (pypi or testpypi)"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build
        run: python -m build

      - name: Check artifacts
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yantrikdb-client-dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/yantrikdb-client/
    permissions:
      id-token: write
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: yantrikdb-client-dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI (manual dispatch only)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/yantrikdb-client/
    permissions:
      id-token: write
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: yantrikdb-client-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: yantrikdb-client-dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Python SDK release — `pip install yantrikdb-client==${{ github.ref_name }}`

            See `README.md` for usage.
