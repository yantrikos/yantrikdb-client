name: Publish to PyPI

# Publishes ONLY when a GitHub Release is explicitly published.
# Rationale: publishing a release is a deliberate UI click; tag push
# alone is too easy to fire accidentally (typo, local cleanup, etc.).
#
# Release flow:
#   1. Bump version in pyproject.toml, commit, push to main
#   2. `git tag -a vX.Y.Z -m "..." && git push origin vX.Y.Z`
#   3. Go to https://github.com/yantrikos/yantrikdb-client/releases/new
#      → select tag vX.Y.Z → draft notes → "Publish release"
#   4. This workflow fires. Approve the `pypi` environment → PyPI upload.
#      Wheel + sdist are attached to the release automatically.
#
# Manual dispatch is kept for TestPyPI dry runs only. Real PyPI
# publishes require going through the Release UI.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Target index (testpypi only — real PyPI requires a GitHub Release)"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build
        run: python -m build

      - name: Check artifacts
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yantrikdb-client-dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/yantrikdb-client/
    permissions:
      id-token: write
    if: github.event_name == 'release'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: yantrikdb-client-dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI (manual dispatch only)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/yantrikdb-client/
    permissions:
      id-token: write
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: yantrikdb-client-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  attach-artifacts:
    name: Attach wheel + sdist to the Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: yantrikdb-client-dist
          path: dist/

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber --repo "${{ github.repository }}"
